<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p id="fun"></p>
    <script>
        document.getElementById("fun").innerHTML = spinWords("Hola mundo como estas hoy");
        function spinWords(string) {
            let words = string.split(" ");
            for (let i = 0; i < words.length; i++) {
                if (words[i].length >= 5) {
                    words[i] = words[i].split("").reverse().join("");
                }
            }
            return words.join(" ");
        }
    </script>
</body>

</html>
